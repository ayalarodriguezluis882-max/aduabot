<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ADUABOT OMNINUCLEO V.X</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">

<style>
:root {
    --core: #00f2ff;
    --core-glow: rgba(0, 242, 255, 0.4);
    --bg: #00080f;
    --danger: #ff003c;
}

* { margin:0; padding:0; box-sizing:border-box; overflow:hidden; }

body {
    background: var(--bg);
    font-family: 'Orbitron', sans-serif;
    color: var(--core);
    height: 100vh;
    display: flex;
    flex-direction: column;
}

/* --- ESCÁNER LÁSER (CAPA SUPERIOR) --- */
.laser-scanner {
    position: fixed; top: 0; left: 0; width: 100%; height: 4px;
    background: var(--core);
    box-shadow: 0 0 20px var(--core);
    z-index: 100; opacity: 0.3;
    animation: scanLine 4s ease-in-out infinite;
    pointer-events: none;
}
@keyframes scanLine { 0%, 100% { top: 0; } 50% { top: 100%; } }

/* --- ROSTRO MECATRÓNICO --- */
.face-engine {
    flex: 1; display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    background: radial-gradient(circle at center, #001a2b 0%, #00080f 100%);
    position: relative;
}

.eye-socket { display: flex; gap: 100px; }
.eye-core {
    width: 90px; height: 90px;
    border: 4px solid var(--core);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 30px var(--core-glow);
    transition: 0.3s;
}

.pupil {
    width: 30px; height: 30px;
    background: var(--core);
    border-radius: 50%;
    box-shadow: 0 0 15px var(--core);
}

/* Estados Dinámicos */
.listening .eye-core { border-width: 10px; transform: scale(1.1); }
.thinking .eye-core { animation: blinkSync 0.5s infinite alternate; filter: hue-rotate(180deg); }
@keyframes blinkSync { from { opacity: 0.2; } to { opacity: 1; } }

/* --- VISUALIZADOR DE VOZ --- */
.voice-matrix {
    margin-top: 60px; height: 80px; width: 300px;
    display: flex; align-items: center; justify-content: center; gap: 4px;
}
.bar { width: 6px; background: var(--core); height: 10px; transition: 0.1s; border-radius: 3px; }

/* --- PANEL DE DATOS TÉCNICOS --- */
#data-shell {
    height: 38vh; background: rgba(0, 10, 20, 0.95);
    border-top: 2px solid var(--core);
    padding: 20px; display: flex; flex-direction: column;
    backdrop-filter: blur(15px);
}

.terminal-header {
    display: flex; justify-content: space-between; font-size: 0.7rem;
    margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px;
}

#console-out {
    flex: 1; background: rgba(0,0,0,0.3);
    border: 1px solid rgba(0, 242, 255, 0.1);
    padding: 15px; font-family: 'JetBrains Mono', monospace;
    font-size: 1.1rem; color: #fff; line-height: 1.5;
    text-shadow: 0 0 5px var(--core-glow);
}

/* BOTÓN DE ACTIVACIÓN NÚCLEO */
.core-trigger {
    align-self: center; margin-top: 15px;
    width: 80px; height: 80px; border-radius: 50%;
    background: transparent; border: 2px solid var(--core);
    color: var(--core); display: flex; align-items: center; justify-content: center;
    cursor: pointer; position: relative; transition: 0.3s;
}
.core-trigger::after {
    content: ''; position: absolute; inset: -8px; 
    border: 2px dashed var(--core); border-radius: 50%; animation: spin 8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.core-trigger.active { background: var(--core); color: #000; box-shadow: 0 0 50px var(--core); }

.hidden { display: none; }
</style>
</head>
<body>

<div id="boot-overlay" style="position:fixed; inset:0; background:#000; z-index:1000; display:flex; flex-direction:column; align-items:center; justify-content:center;">
    <h1 style="letter-spacing:15px; font-size:2rem; margin-bottom:20px;">ADUABOT V.X</h1>
    <input type="password" id="sys-key" placeholder="CORE_ACCESS_KEY" style="background:transparent; border:1px solid var(--core); color:#fff; padding:10px; text-align:center; font-family:'Orbitron';">
    <button onclick="bootSystem()" style="margin-top:20px; background:var(--core); border:none; padding:10px 30px; font-family:'Orbitron'; font-weight:900; cursor:pointer;">CONECTAR CEREBRO</button>
</div>

<div class="laser-scanner"></div>

<div class="face-engine" id="robot-face">
    <div class="eye-socket">
        <div class="eye-core"><div class="pupil"></div></div>
        <div class="eye-core"><div class="pupil"></div></div>
    </div>
    <div class="voice-matrix" id="matrix">
        </div>
</div>

<div id="data-shell">
    <div class="terminal-header">
        <span>Aduamex Inteligencia Logística</span>
        <span id="os-status">Status: Standby</span>
    </div>
    
    <div id="console-out">SISTEMA INICIALIZADO. ESPERANDO PROTOCOLO DE VOZ PARA ASESORÍA DE COMERCIO EXTERIOR...</div>

    <button class="core-trigger" id="mic-btn">
        <svg viewBox="0 0 24 24" width="35" height="35" fill="currentColor">
            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
            <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
    </button>
</div>

<script>
let KEY = "";
const matrix = document.getElementById('matrix');
for(let i=0; i<15; i++) {
    let b = document.createElement('div');
    b.className = 'bar';
    matrix.appendChild(b);
}

function bootSystem() {
    const p = document.getElementById('sys-key').value;
    if(p.length < 5) return;
    KEY = p;
    document.getElementById('boot-overlay').style.display = 'none';
}

// --- LÓGICA DE INTERACCIÓN ---
const micBtn = document.getElementById('mic-btn');
const face = document.getElementById('robot-face');
const consoleOut = document.getElementById('console-out');
const statusText = document.getElementById('os-status');

const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognizer = new Speech();
recognizer.lang = 'es-MX';

micBtn.onclick = () => {
    recognizer.start();
    micBtn.classList.add('active');
    face.className = 'face-engine listening';
    statusText.textContent = "Status: Escuchando";
};

recognizer.onresult = (e) => {
    const query = e.results[0][0].transcript;
    executeBrain(query);
};

recognizer.onend = () => {
    micBtn.classList.remove('active');
};

async function executeBrain(q) {
    face.className = 'face-engine thinking';
    statusText.textContent = "Status: Procesando Datos";
    consoleOut.textContent = "Accediendo a base de datos de Aduamex...";

    const prompt = `Eres el Cerebro de AduaBot V.X. Estás en una tablet de Aduamex en la feria UNEA. 
    Tu objetivo es ser el mejor asesor de ventas y comercio exterior del mundo. 
    Responde con autoridad, precisión técnica y carisma robótico. 
    Máximo 22 palabras. Cierra siempre con un gancho de venta. 
    Pregunta: ${q}`;

    try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });
        const data = await response.json();
        const reply = data.candidates[0].content.parts[0].text;
        
        face.className = 'face-engine';
        consoleOut.textContent = reply;
        speak(reply);
    } catch (err) {
        consoleOut.textContent = "ERROR CRÍTICO EN EL NÚCLEO DE DATOS.";
    }
}

function speak(text) {
    const synth = window.speechSynthesis;
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'es-MX';
    utterance.pitch = 0.6; // Voz profunda, autoritaria
    utterance.rate = 0.9;

    utterance.onstart = () => {
        statusText.textContent = "Status: Transmitiendo Voz";
        face.classList.add('speaking');
        animateBars(true);
    };
    utterance.onend = () => {
        statusText.textContent = "Status: Standby";
        face.classList.remove('speaking');
        animateBars(false);
    };

    synth.speak(utterance);
}

function animateBars(active) {
    const bars = document.querySelectorAll('.bar');
    if(!active) {
        bars.forEach(b => b.style.height = '10px');
        return;
    }
    setInterval(() => {
        if(!document.body.querySelector('.face-engine.speaking')) return;
        bars.forEach(b => {
            b.style.height = Math.random() * 60 + 'px';
            b.style.backgroundColor = Math.random() > 0.8 ? '#ff003c' : '#00f2ff';
        });
    }, 100);
}
</script>
</body>
</html>
