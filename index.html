```html id="gemini_ai_pro"
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AduaBot AI PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:radial-gradient(circle,#020a14,#000);
  color:#00d4ff;
  font-family:'Rajdhani',sans-serif;
  overflow:hidden;
  text-align:center;
}

/* BOTÓN */
#btn{
  margin-top:30vh;
  width:160px;
  height:160px;
  border-radius:50%;
  border:2px solid #00d4ff;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  margin-left:auto;
  margin-right:auto;
}

/* CONSOLA */
#console{
  margin-top:40px;
  font-family:'Share Tech Mono',monospace;
}
</style>
</head>

<body>

<h1>AduaBot IA</h1>

<div id="btn">HABLAR</div>

<div id="console">Presiona para hablar...</div>

<script>

const API_KEY = "PEGA_AQUI_TU_API_KEY";

const btn = document.getElementById("btn");
const consoleEl = document.getElementById("console");

/* VOZ */
function speak(text){
  const msg = new SpeechSynthesisUtterance(text);
  msg.pitch = 0.5;
  msg.rate = 0.9;
  speechSynthesis.cancel();
  speechSynthesis.speak(msg);
}

/* RECONOCIMIENTO DE VOZ */
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

const recognition = new SpeechRecognition();
recognition.lang = "es-MX";
recognition.continuous = false;

/* CLICK */
btn.onclick = () => {
  consoleEl.innerText = "Escuchando...";
  recognition.start();
};

/* CUANDO ESCUCHA */
recognition.onresult = async (event) => {

  const texto = event.results[0][0].transcript;
  consoleEl.innerText = "Tú: " + texto;

  const respuesta = await preguntarGemini(texto);

  consoleEl.innerText = "IA: " + respuesta;
  speak(respuesta);
};

/* ERROR */
recognition.onerror = () => {
  consoleEl.innerText = "Error de micrófono";
};

/* GEMINI */
async function preguntarGemini(texto){

  try{
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY}`,
      {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          contents:[{
            parts:[{text: texto}]
          }]
        })
      }
    );

    const data = await res.json();

    return data.candidates?.[0]?.content?.parts?.[0]?.text || "No entendí";

  }catch(e){
    return "Error conectando con la IA";
  }
}

</script>

</body>
</html>
```
