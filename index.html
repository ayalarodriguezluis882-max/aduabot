<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AduaBot AI</title>

<style>
body{
  margin:0;
  background:#020a14;
  color:#00d4ff;
  font-family:Arial, sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  text-align:center;
}

/* ESTADOS */
.state-idle{background:#020a14;}
.state-listening{background:#140202;}
.state-thinking{background:#021014;}
.state-speaking{background:#02140a;}

#btn{
  margin-top:20px;
  padding:20px 40px;
  border:2px solid #00d4ff;
  cursor:pointer;
  font-size:18px;
  border-radius:10px;
}

#console{
  margin-top:30px;
  font-size:18px;
}
</style>
</head>

<body class="state-idle">

<h1>AduaBot</h1>

<div id="btn">ACTIVAR</div>

<div id="console">Sistema listo...</div>

<script>

console.log("JS cargado correctamente");

const btn = document.getElementById("btn");
const consoleEl = document.getElementById("console");

function setState(state){
  document.body.className = "state-" + state;
}

function delay(ms){
  return new Promise(r => setTimeout(r, ms));
}

btn.addEventListener("click", async function(){

  console.log("CLICK DETECTADO");

  setState("listening");
  consoleEl.innerText = "Escuchando...";
  await delay(1000);

  setState("thinking");
  consoleEl.innerText = "Procesando...";
  await delay(1000);

  setState("speaking");
  consoleEl.innerText = "Sistema activado correctamente";

  // VOZ (opcional)
  if ('speechSynthesis' in window){
    let msg = new SpeechSynthesisUtterance("Sistema activado correctamente");
    speechSynthesis.speak(msg);
  }

  await delay(2000);

  setState("idle");
  consoleEl.innerText = "Sistema listo...";
});

</script>

</body>
</html>
