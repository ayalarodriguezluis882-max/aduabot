<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ADUABOT FINAL BOSS</title>

<style>
body{
  margin:0;
  background:radial-gradient(circle,#001,#000);
  color:#00f0ff;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* PANEL */
#panel{
  text-align:center;
  width:320px;
}

/* OJOS */
.eyes{
  display:flex;
  justify-content:space-around;
  margin-bottom:10px;
}
.eye{
  width:60px;
  height:60px;
  background:#00f0ff;
  border-radius:50%;
  box-shadow:0 0 25px #00f0ff;
  transition:0.1s;
}

/* BOCA */
.mouth{
  width:180px;
  height:15px;
  margin:auto;
  background:#00f0ff;
  border-radius:20px;
}

/* HABLANDO */
.talking .mouth{
  animation:talk 0.12s infinite;
}
@keyframes talk{
  0%{height:10px;}
  50%{height:70px;}
  100%{height:15px;}
}

/* ESCUCHANDO */
.listening .eye{
  background:#ff0033;
  box-shadow:0 0 40px #ff0033;
}

/* BOTON */
button{
  margin-top:20px;
  padding:12px 25px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#00f0ff;
  cursor:pointer;
}

/* TEXTO */
#output{
  margin-top:15px;
  color:white;
  min-height:60px;
}

/* ENERGIA */
#energy{
  margin-top:10px;
  height:6px;
  background:#222;
}
#bar{
  height:100%;
  width:100%;
  background:#00f0ff;
}
</style>
</head>

<body>

<div id="panel">
  <div class="eyes">
    <div class="eye"></div>
    <div class="eye"></div>
  </div>

  <div class="mouth" id="mouth"></div>

  <button onclick="start()">INICIAR</button>

  <div id="output">AduaBot listo para dominar la feria...</div>

  <div id="energy"><div id="bar"></div></div>
</div>

<script>
let recognition;
let energy=100;

/* VOZ */
function speak(text){
  const u=new SpeechSynthesisUtterance(text);
  u.lang="es-MX";
  u.pitch=0.6;
  u.rate=0.92;

  const panel=document.body;

  u.onstart=()=>panel.classList.add("talking");
  u.onend=()=>panel.classList.remove("talking");

  speechSynthesis.speak(u);
}

/* ENERGIA */
function useEnergy(n){
  energy-=n;
  if(energy<0) energy=0;
  document.getElementById("bar").style.width=energy+"%";
}

/* DETECCION INTELIGENTE */
function detectar(q){
  q=q.toLowerCase();

  if(q.includes("cuanto")||q.includes("costo")||q.includes("precio")){
    return "simulador";
  }
  if(q.includes("importar")||q.includes("exportar")||q.includes("aduana")){
    return "experto";
  }
  return "ventas";
}

/* SIMULADOR */
function simular(q){
  let costo=Math.floor(Math.random()*5000+1000);
  let impuestos=Math.floor(costo*0.16);
  return `Costo estimado ${costo} pesos. Impuestos ${impuestos}. Te optimizo costos. Visítanos en el stand.`;
}

/* IA */
async function ask(q){
  useEnergy(5);
  document.getElementById("output").innerText="Procesando...";

  let tipo=detectar(q);
  let prompt="";

  if(tipo==="ventas"){
    prompt=`Eres vendedor experto. Responde agresivo, convincente, máximo 18 palabras. Termina: Visítanos en el stand. ${q}`;
  }
  else if(tipo==="experto"){
    prompt=`Eres experto en comercio exterior. Responde claro en máximo 25 palabras. ${q}`;
  }
  else{
    let r=simular(q);
    document.getElementById("output").innerText=r;
    speak(r);
    return;
  }

  try{
    const res=await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=TU_API_KEY",{
      method:"POST",
      headers:{ "Content-Type":"application/json"},
      body: JSON.stringify({
        contents:[{ parts:[{ text:prompt }]}]
      })
    });

    const data=await res.json();
    const r=data.candidates[0].content.parts[0].text;

    document.getElementById("output").innerText=r;
    speak(r);

  }catch{
    document.getElementById("output").innerText="Error IA";
  }
}

/* SPEECH CONTINUO */
function start(){
  const Speech=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new Speech();
  recognition.lang="es-MX";
  recognition.continuous=true;

  document.body.classList.add("listening");

  recognition.start();

  recognition.onresult=(e)=>{
    const t=e.results[e.results.length-1][0].transcript;
    ask(t);
  };

  recognition.onend=()=>{
    document.body.classList.remove("listening");
    start();
  };
}

/* ATRACCION AUTOMATICA */
setInterval(()=>{
  const frases=[
    "¿Quieres importar sin pagar de más?",
    "Reduce tus costos en aduana",
    "Haz crecer tu negocio internacional",
    "Optimiza tu logística hoy mismo"
  ];

  const f=frases[Math.floor(Math.random()*frases.length)];

  document.getElementById("output").innerText=f;
  speak(f);

},10000);

</script>

</body>
</html>
