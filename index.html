<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AduaBot">
<meta name="mobile-web-app-capable" content="yes">

<title>AduaBot · AduaMex</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
:root{
  --cyan:#00d4ff;--cyan2:#3de8ff;--cyan3:#006699;
  --blue:#0066cc;--deep:#020a14;--mid:#041525;
  --white:#e0f8ff;--red:#ff2244;--green:#00ffaa;
}
/* BLOQUEO DE GESTOS WEB */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;overscroll-behavior:none;background:#000;position:fixed;font-family:'Rajdhani',sans-serif;}

/* MARCO RESPIRACIÓN ORIGINAL */
#os-frame{position:fixed;inset:0;border:2px solid var(--cyan);z-index:100;pointer-events:none;animation:breathe 4s infinite;}
@keyframes breathe{0%,100%{opacity:0.3;box-shadow:inset 0 0 15px var(--cyan3);}50%{opacity:1;box-shadow:inset 0 0 40px var(--cyan3),0 0 10px var(--cyan);}}

#app-shell{position:relative;z-index:10;height:100%;display:flex;flex-direction:column;padding:25px;background:radial-gradient(circle at center,var(--mid) 0%,var(--deep) 100%);}

/* HEADER Y ENERGÍA */
.header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid var(--cyan);padding-bottom:15px;margin-bottom:20px;}
.brand h1{font-family:'Bebas Neue';font-size:2.8rem;letter-spacing:4px;color:var(--cyan);line-height:1;}
.brand p{font-family:'Share Tech Mono';font-size:0.6rem;letter-spacing:3px;color:var(--white);opacity:0.6;}

.energy-module{text-align:right;width:140px;}
.energy-label{font-family:'Share Tech Mono';font-size:0.55rem;margin-bottom:4px;display:block;}
.bar-bg{height:6px;background:rgba(255,255,255,0.1);border:1px solid var(--cyan);overflow:hidden;}
#energy-fill{height:100%;width:100%;background:var(--cyan);transition:width 0.5s;box-shadow:0 0 10px var(--cyan);}

/* CONSOLA DE TEXTO */
#console{flex-grow:0;min-height:120px;background:rgba(0,212,255,0.03);border:1px solid rgba(0,212,255,0.1);padding:15px;color:var(--white);text-align:center;font-size:1.1rem;margin-bottom:20px;display:flex;align-items:center;justify-content:center;text-shadow:0 0 8px var(--cyan3);}

/* NÚCLEO MECÁNICO (ENGRANES) */
.core-wrap{flex-grow:1;display:flex;justify-content:center;align-items:center;position:relative;}
.gears{position:absolute;width:280px;height:280px;background:url('engranes.png') no-repeat center;background-size:contain;opacity:0.3;animation:spin 20s linear infinite;filter:drop-shadow(0 0 5px var(--cyan));}
@keyframes spin{to{transform:rotate(360deg);}}

.main-btn{width:180px;height:180px;border-radius:50%;background:#000;border:4px solid var(--cyan);position:relative;z-index:5;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 0 30px var(--cyan3);outline:none;cursor:pointer;transition:0.2s;}
.s-listening .main-btn{border-color:var(--red);box-shadow:0 0 50px var(--red);transform:scale(0.95);}
.s-thinking .main-btn{border-color:#fff;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}

#btn-text{font-family:'Bebas Neue';font-size:1.2rem;margin-top:10px;letter-spacing:2px;color:var(--cyan);}

/* KEYSCREEN SEGURIDAD */
#keyscreen{position:fixed;inset:0;z-index:500;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;}
.ks-input{background:transparent;border:1px solid var(--cyan);padding:15px;color:#fff;width:280px;text-align:center;font-family:'Share Tech Mono';outline:none;}
.ks-btn{background:var(--cyan);color:#000;padding:15px 40px;border:none;font-family:'Bebas Neue';font-size:1.2rem;letter-spacing:2px;cursor:pointer;}

.hidden{display:none !important;}
</style>
</head>
<body>

<div id="os-frame"></div>

<div id="keyscreen">
    <h1 style="font-family:'Bebas Neue';font-size:3rem;letter-spacing:8px;color:var(--cyan);">ADUABOT OS</h1>
    <p style="font-size:0.7rem;opacity:0.5;letter-spacing:3px;color:var(--white);">ESTABLECIENDO CONEXIÓN SEGURA</p>
    <input type="password" id="ksInput" class="ks-input" placeholder="INGRESA TU CLAVE">
    <button class="ks-btn" onclick="initOS()">BOOT SYSTEM</button>
</div>

<div id="app-shell" class="hidden">
    <div class="header">
        <div class="brand">
            <h1>ADUAMEX</h1>
            <p>EXPERTO COMERCIAL // FERIA UNEA</p>
        </div>
        <div class="energy-module">
            <span class="energy-label">CORE ENERGY</span>
            <div class="bar-bg"><div id="energy-fill"></div></div>
        </div>
    </div>

    <div id="console">SISTEMA INICIALIZADO. MANTÉN EL NÚCLEO PARA HABLAR CON EL ASESOR.</div>

    <div class="core-wrap" id="ptt-trigger">
        <div class="gears"></div>
        <button class="main-btn">
            <svg width="60" height="60" viewBox="0 0 24 24" fill="var(--cyan)">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
            </svg>
            <span id="btn-text">CONECTAR</span>
        </button>
    </div>

    <div style="text-align:center;font-family:'Share Tech Mono';font-size:0.5rem;opacity:0.4;letter-spacing:3px;padding-top:10px;">
        ADUAMEX INDUSTRIAL OS v6.5 // TIJUANA BC MX
    </div>
</div>

<script>
let KEY = ""; 
let energy = 100; 
let isHolding = false; 
let rec = null; 
let transcript = "";

/* --- INICIALIZAR SISTEMA --- */
function initOS() {
    const val = document.getElementById('ksInput').value;
    if(val.length < 10) return alert("ACCESS DENIED: CLAVE INCORRECTA");
    KEY = val;
    document.getElementById('keyscreen').classList.add('hidden');
    document.getElementById('app-shell').classList.remove('hidden');
    // Forzar carga de voces de hombre
    window.speechSynthesis.getVoices();
}

/* --- BARRA DE ENERGÍA --- */
function updateEnergy(amt) {
    energy -= amt; 
    if(energy < 0) energy = 0;
    document.getElementById('energy-fill').style.width = energy + "%";
    if(energy <= 0) {
        document.getElementById('console').textContent = "ERROR: ENERGÍA AGOTADA. RECARGANDO NÚCLEO...";
        setTimeout(() => { energy = 100; updateEnergy(0); document.getElementById('console').textContent = "SISTEMA RECARGADO. LISTO."; }, 10000);
    }
}

/* --- RECONOCIMIENTO DE VOZ (PUSH TO TALK) --- */
function setupMic() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SR) return null;
    const r = new SR(); 
    r.lang = 'es-MX'; 
    r.continuous = true; 
    r.interimResults = true;
    
    r.onresult = e => {
        let interim = "";
        for(let i=e.resultIndex; i<e.results.length; i++) {
            if(e.results[i].isFinal) transcript += e.results[i][0].transcript;
            else interim += e.results[i][0].transcript;
        }
        document.getElementById('console').textContent = transcript || interim;
    };
    return r;
}

const trigger = document.getElementById('ptt-trigger');
const shell = document.getElementById('app-shell');

function startPTT(e) {
    e.preventDefault(); 
    if(isHolding || energy <= 0) return;
    isHolding = true; 
    transcript = "";
    shell.classList.add('s-listening');
    document.getElementById('btn-text').textContent = "ESCUCHANDO";
    rec = setupMic(); 
    if(rec) rec.start();
}

function stopPTT(e) {
    e.preventDefault(); 
    if(!isHolding) return;
    isHolding = false; 
    shell.classList.remove('s-listening');
    document.getElementById('btn-text').textContent = "CONECTAR";
    
    if(rec) {
        rec.stop();
        setTimeout(() => {
            const query = document.getElementById('console').textContent;
            if(query.length > 2 && !query.includes("SISTEMA")) askGemini(query);
        }, 500);
    }
}

/* EVENTOS PARA MÓVIL Y PC */
trigger.addEventListener('mousedown', startPTT);
trigger.addEventListener('mouseup', stopPTT);
trigger.addEventListener('touchstart', startPTT);
trigger.addEventListener('touchend', stopPTT);

/* --- LLAMADA A INTELIGENCIA ARTIFICIAL --- */
async function askGemini(q) {
    shell.classList.add('s-thinking'); 
    updateEnergy(5);
    
    const URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${KEY}`;
    
    try {
        const res = await fetch(URL, {
            method: 'POST', 
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ 
                contents: [{ 
                    parts: [{ text: `Eres AduaBot de AduaMex. Experto comercial en la feria UNEA. Vende servicios de agencia aduanal y logística. Sé varonil, muy profesional y breve (máximo 25 palabras). Respuesta para: ${q}` }] 
                }] 
            })
        });
        const data = await res.json();
        shell.classList.remove('s-thinking');
        
        if(data.candidates) {
            const reply = data.candidates[0].content.parts[0].text;
            document.getElementById('console').textContent = reply;
            updateEnergy(reply.length / 20); // Consumo extra por longitud de respuesta
            speak(reply);
        }
    } catch(err) { 
        shell.classList.remove('s-thinking'); 
        document.getElementById('console').textContent = "ERROR DE CONEXIÓN CON EL SATÉLITE ADUAMEX."; 
    }
}

/* --- VOZ DE HOMBRE ROBÓTICA --- */
function speak(t) {
    const synth = window.speechSynthesis;
    if(synth.speaking) synth.cancel();
    const u = new SpeechSynthesisUtterance(t);
    u.lang = 'es-MX'; 
    u.pitch = 0.5; // Voz grave de hombre
    u.rate = 0.95;  // Velocidad profesional
    
    const voices = synth.getVoices();
    // Buscar específicamente voces masculinas de Google o sistema
    const male = voices.find(v => v.name.includes('Jorge') || v.name.includes('Google español') || v.name.toLowerCase().includes('male'));
    if(male) u.voice = male;
    
    synth.speak(u);
}

// Escuchador necesario para cargar las voces en algunos navegadores móviles
window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
</script>
</body>
</html>
