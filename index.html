<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AduaBot ULTRA AI</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#020a14;
  color:#00d4ff;
  font-family:'Rajdhani',sans-serif;
  overflow:hidden;
}

/* HUD */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:0;
}

#ui{
  position:relative;
  z-index:2;
  text-align:center;
  margin-top:15vh;
}

#btn{
  width:180px;
  height:180px;
  border-radius:50%;
  border:2px solid #00d4ff;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:auto;
  cursor:pointer;
  box-shadow:0 0 40px rgba(0,212,255,.4);
}

#console{
  position:absolute;
  bottom:0;
  width:100%;
  max-height:200px;
  overflow-y:auto;
  font-family:'Share Tech Mono';
  background:rgba(0,0,0,.6);
  padding:10px;
}
</style>
</head>

<body>

<canvas id="hud"></canvas>

<div id="ui">
  <h1>AduaBot AI</h1>
  <div id="btn">HABLAR</div>
</div>

<div id="console"></div>

<script>

const API_KEY = "PEGA_TU_API_KEY";

/* ===== CANVAS HUD DINÁMICO ===== */
const canvas = document.getElementById("hud");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.onresize = resize;
resize();

let particles = Array.from({length:80}, ()=>({
  x:Math.random()*canvas.width,
  y:Math.random()*canvas.height,
  vx:(Math.random()-.5)*1,
  vy:(Math.random()-.5)*1
}));

function animate(){
  ctx.fillStyle="rgba(2,10,20,0.2)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="#00d4ff";

  particles.forEach(p=>{
    p.x+=p.vx;
    p.y+=p.vy;

    if(p.x<0||p.x>canvas.width) p.vx*=-1;
    if(p.y<0||p.y>canvas.height) p.vy*=-1;

    ctx.fillRect(p.x,p.y,2,2);
  });

  requestAnimationFrame(animate);
}
animate();

/* ===== SISTEMA ===== */

const btn = document.getElementById("btn");
const consoleEl = document.getElementById("console");

let busy=false;

/* LOG */
function log(text){
  const div=document.createElement("div");
  div.textContent=text;
  consoleEl.appendChild(div);
  consoleEl.scrollTop = consoleEl.scrollHeight;
}

/* VOZ */
function speak(text){
  if(!speechSynthesis) return;
  const msg=new SpeechSynthesisUtterance(text);
  msg.pitch=0.5;
  msg.rate=0.9;
  speechSynthesis.cancel();
  speechSynthesis.speak(msg);
}

/* IA */
async function preguntar(texto){
  try{
    const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY}`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        contents:[{parts:[{text:texto}]}]
      })
    });

    const data=await res.json();
    return data.candidates?.[0]?.content?.parts?.[0]?.text || "Sin respuesta";

  }catch{
    return "Error IA";
  }
}

/* VOZ INPUT */
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

let rec;

if(SpeechRecognition){
  rec=new SpeechRecognition();
  rec.lang="es-MX";
}

/* EVENTO */
btn.onclick=()=>{
  if(busy) return;
  if(!rec){
    log("No soporta voz");
    return;
  }

  log("🎤 Escuchando...");
  rec.start();
};

rec.onresult=async (e)=>{
  busy=true;

  const texto=e.results[0][0].transcript;
  log("TÚ: "+texto);

  log("🧠 Pensando...");
  const res=await preguntar(texto);

  log("🤖 IA: "+res);
  speak(res);

  busy=false;
};

rec.onerror=()=>{
  log("Error micrófono");
  busy=false;
};

</script>

</body>
</html>
