<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">

<title>ADUABOT OS</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --b:#00cfff; --b-glow:rgba(0,207,255,0.35);
  --b2:#0066ff; --b2-glow:rgba(0,102,255,0.3);
  --dark:#010409; --white:#e0f8ff;
  --red:#ff2255; --accent:#00ffe7;
  --grid: rgba(0,207,255,0.04);
}

html, body { 
    overflow: hidden; 
    overscroll-behavior: none; 
    height: 100%; 
    width: 100%;
    position: fixed;
}

*{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body{
    background: var(--dark);
    font-family: 'Rajdhani', sans-serif;
    color: var(--b);
}

/* GRID DE FONDO */
body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
}

/* SCANLINE */
body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
    );
    pointer-events: none; z-index: 1;
    animation: scanmove 8s linear infinite;
}
@keyframes scanmove {
    0% { background-position: 0 0; }
    100% { background-position: 0 400px; }
}

/* BOOT SEQUENCE */
#boot-sequence {
    position: fixed; inset: 0; z-index: 1000;
    background: #000; color: var(--b);
    font-family: 'Share Tech Mono', monospace;
    padding: 20px; font-size: 0.8rem;
    display: flex; flex-direction: column;
}

/* MARCO HUD */
#frame-os {
    position: fixed; inset: 0;
    z-index: 100; pointer-events: none;
}

/* Esquinas HUD */
#frame-os::before, #frame-os::after,
.hud-corner-bl, .hud-corner-br {
    content: '';
    position: absolute;
    width: 28px; height: 28px;
    border-color: var(--b);
    border-style: solid;
    opacity: 0.7;
    animation: hud-pulse 3s ease-in-out infinite;
}
#frame-os::before { top: 12px; left: 12px; border-width: 2px 0 0 2px; }
#frame-os::after  { top: 12px; right: 12px; border-width: 2px 2px 0 0; }
.hud-corner-bl    { bottom: 12px; left: 12px; border-width: 0 0 2px 2px; }
.hud-corner-br    { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; }

@keyframes hud-pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
}

/* Líneas HUD laterales */
.hud-line-top {
    position: absolute; top: 12px; left: 52px; right: 52px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--b), transparent);
    opacity: 0.3;
}
.hud-line-bottom {
    position: absolute; bottom: 12px; left: 52px; right: 52px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--b), transparent);
    opacity: 0.3;
}

/* DASHBOARD PRINCIPAL */
#app-shell {
    position: relative; z-index: 10;
    height: 100vh; width: 100vw;
    display: flex; flex-direction: column;
    padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px;
    background: radial-gradient(ellipse at 50% 40%, #071828 0%, #010409 70%);
}

.top-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 15px 0;
    border-bottom: 1px solid rgba(0,207,255,0.2);
    position: relative;
}

/* Indicador de señal animado */
.signal-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
    animation: blink 1.4s ease-in-out infinite;
    margin-right: 6px;
    vertical-align: middle;
}
@keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
}

.status-bits { 
    font-family: 'Share Tech Mono'; 
    font-size: 0.58rem; 
    letter-spacing: 1.5px;
    color: rgba(0,207,255,0.7);
}

/* MONITOR PRINCIPAL */
.monitor {
    flex-grow: 1; display: flex; flex-direction: column;
    justify-content: center; align-items: center; gap: 28px;
}

/* CONSOLA DE SALIDA */
#output-console {
    width: 100%;
    min-height: 120px;
    background: rgba(0, 15, 30, 0.8);
    border: 1px solid rgba(0,207,255,0.15);
    border-top: 2px solid rgba(0,207,255,0.4);
    padding: 16px 18px;
    border-radius: 2px;
    text-align: center;
    font-size: 1.05rem;
    color: var(--white);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    letter-spacing: 0.5px;
    position: relative;
    overflow: hidden;
}

#output-console::before {
    content: 'OUTPUT //';
    position: absolute; top: 4px; left: 10px;
    font-family: 'Share Tech Mono'; font-size: 0.5rem;
    color: rgba(0,207,255,0.3); letter-spacing: 2px;
}

/* CURSOR PARPADEANTE en consola */
#output-console::after {
    content: '▋';
    animation: cursor-blink 1s step-end infinite;
    color: var(--b); font-size: 0.9rem;
    margin-left: 2px;
}
@keyframes cursor-blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
}

/* NÚCLEO DE PODER */
.core-engine {
    position: relative; width: 220px; height: 220px;
    display: flex; align-items: center; justify-content: center;
}

/* Anillos múltiples */
.core-ring {
    position: absolute; inset: 0;
    border: 1px solid rgba(0,207,255,0.5);
    border-radius: 50%;
    border-top-color: var(--b);
    border-right-color: transparent;
    animation: spin 3s linear infinite;
}
.core-ring-2 {
    position: absolute; inset: 12px;
    border: 1px solid rgba(0,207,255,0.25);
    border-radius: 50%;
    border-bottom-color: var(--b);
    border-left-color: transparent;
    animation: spin 5s linear infinite reverse;
}
.core-ring-3 {
    position: absolute; inset: 22px;
    border: 1px dashed rgba(0,207,255,0.12);
    border-radius: 50%;
    animation: spin 8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* Marcadores de posición en el anillo exterior */
.core-tick {
    position: absolute; inset: 0;
    border-radius: 50%;
    animation: spin 3s linear infinite;
}
.core-tick::before, .core-tick::after {
    content: '';
    position: absolute;
    width: 4px; height: 4px;
    background: var(--b);
    border-radius: 50%;
    box-shadow: 0 0 6px var(--b);
    top: 0; left: 50%; transform: translateX(-50%);
}
.core-tick::after {
    top: auto; bottom: 0;
    background: rgba(0,207,255,0.3);
    box-shadow: none;
    width: 3px; height: 3px;
}

.main-btn {
    width: 162px; height: 162px; border-radius: 50%;
    background: radial-gradient(circle, #071828 40%, #010d1a 100%);
    border: 2px solid var(--b);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    box-shadow: 
        0 0 0 1px rgba(0,207,255,0.1),
        0 0 30px var(--b-glow),
        inset 0 0 20px rgba(0,207,255,0.05);
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
}

/* Reflejo interno */
.main-btn::before {
    content: '';
    position: absolute;
    width: 60%; height: 30%;
    top: 12%;
    background: rgba(0,207,255,0.06);
    border-radius: 50%;
    filter: blur(4px);
}

.s-listening .main-btn { 
    border-color: var(--red); 
    box-shadow: 0 0 0 1px rgba(255,34,85,0.2), 0 0 50px rgba(255,34,85,0.5), inset 0 0 20px rgba(255,34,85,0.08);
    transform: scale(0.96);
}

.s-thinking .main-btn { 
    border-color: #ffffff88; 
    animation: think-pulse 0.8s ease-in-out infinite; 
}
@keyframes think-pulse {
    0%, 100% { box-shadow: 0 0 20px rgba(255,255,255,0.1), inset 0 0 10px rgba(255,255,255,0.03); }
    50%  { box-shadow: 0 0 45px rgba(255,255,255,0.25), inset 0 0 25px rgba(255,255,255,0.08); }
}

/* MIC ICON */
.mic-icon {
    filter: drop-shadow(0 0 8px var(--b));
    transition: filter 0.3s;
}
.s-listening .mic-icon { filter: drop-shadow(0 0 12px var(--red)); }

/* BARRA DE ENERGÍA */
.power-level { width: 100%; max-width: 300px; }

.bar-wrap { 
    height: 4px; 
    background: rgba(0,207,255,0.08); 
    margin-top: 6px; 
    position: relative;
    border-radius: 2px;
    overflow: hidden;
}

#bar-fill { 
    height: 100%; 
    width: 100%; 
    background: linear-gradient(90deg, #0066ff, var(--b), var(--accent));
    border-radius: 2px;
    transition: width 0.4s ease;
    box-shadow: 0 0 8px var(--b);
}

/* Brillo deslizante en la barra */
#bar-fill::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.3) 50%, transparent 100%);
    background-size: 200% 100%;
    animation: bar-shine 2s linear infinite;
}
@keyframes bar-shine {
    0% { background-position: -100% 0; }
    100% { background-position: 200% 0; }
}

/* PUNTOS DECORATIVOS */
.dot-grid {
    display: flex; gap: 8px; justify-content: center; align-items: center;
}
.dot-grid span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--b);
    animation: dot-pulse 2s ease-in-out infinite;
}
.dot-grid span:nth-child(2) { animation-delay: 0.4s; opacity: 0.4; }
.dot-grid span:nth-child(3) { animation-delay: 0.8s; opacity: 0.15; }
@keyframes dot-pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.4); }
}

/* KEYSCREEN */
#keyscreen {
    position: fixed; inset: 0; z-index: 2000;
    background: radial-gradient(ellipse at 50% 50%, #050e1a 0%, #000 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
}

/* Hexágono decorativo en el keyscreen */
.ks-hex {
    width: 80px; height: 80px; margin-bottom: 10px;
    position: relative;
    display: flex; align-items: center; justify-content: center;
}
.ks-hex::before {
    content: '';
    position: absolute; inset: 0;
    border: 2px solid var(--b);
    clip-path: polygon(50% 0%, 93% 25%, 93% 75%, 50% 100%, 7% 75%, 7% 25%);
    animation: hex-rotate 6s linear infinite;
    opacity: 0.6;
}
@keyframes hex-rotate {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
.ks-hex-inner {
    width: 50px; height: 50px;
    border: 1px solid rgba(0,207,255,0.4);
    clip-path: polygon(50% 0%, 93% 25%, 93% 75%, 50% 100%, 7% 75%, 7% 25%);
    background: rgba(0,207,255,0.05);
    animation: hex-rotate 4s linear infinite reverse;
}

.ks-title-wrap { text-align: center; }
.ks-title-wrap h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 2.4rem;
    font-weight: 900;
    letter-spacing: 6px;
    color: var(--b);
    text-shadow: 0 0 20px var(--b-glow), 0 0 40px rgba(0,207,255,0.2);
}
.ks-title-wrap p {
    font-family: 'Share Tech Mono';
    font-size: 0.62rem;
    color: rgba(0,207,255,0.45);
    letter-spacing: 4px;
    margin-top: 4px;
}

.ks-input {
    background: rgba(0,207,255,0.04);
    border: 1px solid rgba(0,207,255,0.3);
    border-bottom: 2px solid var(--b);
    padding: 14px 20px;
    color: var(--white);
    width: 280px;
    text-align: center;
    font-family: 'Share Tech Mono';
    font-size: 0.95rem;
    letter-spacing: 3px;
    outline: none;
    transition: all 0.3s;
    border-radius: 1px;
}
.ks-input:focus {
    background: rgba(0,207,255,0.08);
    border-bottom-color: var(--accent);
    box-shadow: 0 4px 20px rgba(0,207,255,0.15);
}
.ks-input::placeholder { color: rgba(0,207,255,0.25); letter-spacing: 4px; }

.ks-btn {
    background: transparent;
    color: var(--b);
    padding: 14px 44px;
    border: 1px solid var(--b);
    font-family: 'Orbitron', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
    border-radius: 1px;
}
.ks-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--b);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.25s ease;
    z-index: -1;
}
.ks-btn:hover { color: #000; box-shadow: 0 0 20px var(--b-glow); }
.ks-btn:hover::before { transform: scaleX(1); }
.ks-btn:active { transform: scale(0.97); }

/* LOGO en el top bar */
.logo-text {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.4rem;
    font-weight: 900;
    letter-spacing: 3px;
    color: var(--b);
    text-shadow: 0 0 10px var(--b-glow);
    line-height: 1;
}

/* NOMBRE DEL BOTÓN */
#btn-text {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 3px;
    margin-top: 8px;
    color: var(--b);
    transition: color 0.3s;
}
.s-listening #btn-text { color: var(--red); }
.s-thinking #btn-text { color: #fff; }

/* FOOTER */
.footer-bar {
    padding: 10px;
    text-align: center;
    border-top: 1px solid rgba(0,207,255,0.08);
    position: relative;
}
.footer-bar::before {
    content: '';
    position: absolute; top: 0; left: 25%; right: 25%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,207,255,0.4), transparent);
}

.hidden { display: none !important; }
</style>
</head>
<body>

<div id="frame-os">
    <div class="hud-corner-bl"></div>
    <div class="hud-corner-br"></div>
    <div class="hud-line-top"></div>
    <div class="hud-line-bottom"></div>
</div>

<div id="keyscreen">
    <div class="ks-hex">
        <div class="ks-hex-inner"></div>
    </div>
    <div class="ks-title-wrap">
        <h1>ADUABOT v6.0</h1>
        <p>UNEA CAMPUS — TRÁFICO Y LOGÍSTICA</p>
    </div>
    <input type="password" id="apiKey" class="ks-input" placeholder="ACCESS KEY">
    <button class="ks-btn" onclick="initSystem()">CONECTAR NÚCLEO</button>
</div>

<div id="app-shell" class="hidden">
    <div class="top-bar">
        <div>
            <div class="logo-text">ADUAMEX</div>
            <div class="status-bits" style="margin-top:4px;">
                <span class="signal-dot"></span>STATUS: ONLINE // AI: ACTIVE
            </div>
        </div>
        <div class="token-system" style="text-align: right;">
            <div class="status-bits">CORE ENERGY</div>
            <div class="bar-wrap" style="width: 120px;"><div id="bar-fill"></div></div>
        </div>
    </div>

    <div class="monitor">
        <div id="output-console">SISTEMA INICIALIZADO. ESPERANDO COMANDOS DE VOZ...</div>

        <div class="core-engine" id="ptt-trigger">
            <div class="core-ring"></div>
            <div class="core-ring-2"></div>
            <div class="core-ring-3"></div>
            <div class="core-tick"></div>
            <div class="main-btn">
                <svg class="mic-icon" width="58" height="58" viewBox="0 0 24 24" fill="var(--b)">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                    <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                </svg>
                <span id="btn-text">HABLAR</span>
            </div>
        </div>

        <div class="power-level" style="text-align: center;">
            <p class="status-bits" style="margin-bottom: 10px; opacity: 0.5; letter-spacing: 2px;">ASESORÍA EXPERTA EN COMERCIO EXTERIOR</p>
            <div class="dot-grid">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </div>

    <div class="footer-bar">
        <p class="status-bits" style="opacity: 0.25; letter-spacing: 2px;">PROPERTY OF ADUAMEX S.A. DE C.V.</p>
    </div>
</div>

<script>
let KEY = "";
let energy = 100;
let isBusy = false;
let recognition = null;
let transcript = "";

function initSystem() {
    const input = document.getElementById('apiKey').value;
    if(input.length < 10) return alert("LLAVE DENEGADA");
    KEY = input;
    document.getElementById('keyscreen').classList.add('hidden');
    document.getElementById('app-shell').classList.remove('hidden');
    
    if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen();
    }
}

function consumeEnergy(amt) {
    energy -= amt;
    if(energy < 0) energy = 0;
    document.getElementById('bar-fill').style.width = energy + "%";
    if(energy <= 0) {
        document.getElementById('output-console').textContent = "ERROR: ENERGÍA INSUFICIENTE. RECARGANDO...";
        setTimeout(() => { energy = 100; consumeEnergy(0); }, 5000);
    }
}

function setupSpeech() {
    const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!Speech) return null;
    const r = new Speech();
    r.lang = 'es-MX';
    r.continuous = true;
    r.interimResults = true;
    r.onresult = (e) => {
        let interim = "";
        for (let i = e.resultIndex; i < e.results.length; ++i) {
            if (e.results[i].isFinal) transcript += e.results[i][0].transcript;
            else interim += e.results[i][0].transcript;
        }
        document.getElementById('output-console').textContent = transcript || interim;
    };
    return r;
}

const trigger = document.getElementById('ptt-trigger');
const shell = document.getElementById('app-shell');

function startPTT(e) {
    e.preventDefault();
    if(isBusy || energy <= 0) return;
    isBusy = true;
    transcript = "";
    shell.classList.add('s-listening');
    document.getElementById('btn-text').textContent = "ESCUCHANDO";
    recognition = setupSpeech();
    if(recognition) recognition.start();
}

function stopPTT(e) {
    e.preventDefault();
    if(!isBusy) return;
    isBusy = false;
    shell.classList.remove('s-listening');
    document.getElementById('btn-text').textContent = "HABLAR";
    if(recognition) {
        recognition.stop();
        setTimeout(() => {
            const finalQ = document.getElementById('output-console').textContent;
            if(finalQ.length > 2) processQuery(finalQ);
        }, 500);
    }
}

trigger.addEventListener('mousedown', startPTT);
trigger.addEventListener('mouseup', stopPTT);
trigger.addEventListener('touchstart', startPTT);
trigger.addEventListener('touchend', stopPTT);

async function processQuery(q) {
    shell.classList.add('s-thinking');
    consumeEnergy(5);
    
    const context = `Eres AduaBot, el experto de AduaMex en la feria UNEA. Vende los servicios de AduaMex. Sé profesional, varonil y directo. Máximo 25 palabras. Al final di: "Visítanos en el stand". Pregunta: ${q}`;
    
    try {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${KEY}`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ contents: [{ parts: [{ text: context }] }] })
        });
        const data = await res.json();
        shell.classList.remove('s-thinking');
        
        if(data.candidates) {
            const reply = data.candidates[0].content.parts[0].text;
            document.getElementById('output-console').textContent = reply;
            speak(reply);
        }
    } catch (err) {
        shell.classList.remove('s-thinking');
        document.getElementById('output-console').textContent = "ERROR DE CONEXIÓN CON EL NÚCLEO.";
    }
}

function speak(t) {
    const synth = window.speechSynthesis;
    const u = new SpeechSynthesisUtterance(t);
    u.lang = 'es-MX';
    u.pitch = 0.5;
    u.rate = 0.9;
    
    const voices = synth.getVoices();
    const male = voices.find(v => v.name.includes('Jorge') || v.name.includes('Pablo') || v.name.toLowerCase().includes('male'));
    if(male) u.voice = male;
    
    synth.speak(u);
}
</script>

</body>
</html>
