```html
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AduaBot AI</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
:root{
  --cyan:#00d4ff;
}

body{
  margin:0;
  background:#020a14;
  font-family:'Rajdhani',sans-serif;
  color:#e0f8ff;
  overflow:hidden;
  transition:.4s;
}

/* ESTADOS */
.state-idle{background:#020a14;}
.state-listening{background:#140202;}
.state-thinking{background:#021014;}
.state-speaking{background:#02140a;}

/* RADAR */
.radar{
  position:fixed;
  inset:0;
  background: radial-gradient(circle,rgba(0,212,255,0.06),transparent);
  animation:radar 3s infinite;
}
@keyframes radar{
  0%{transform:scale(.9);opacity:.2}
  50%{transform:scale(1.1);opacity:.5}
  100%{transform:scale(.9);opacity:.2}
}

/* CENTRO */
.center{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

/* BOTÓN */
#btn{
  width:150px;
  height:150px;
  border-radius:50%;
  border:2px solid var(--cyan);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  box-shadow:0 0 25px rgba(0,212,255,.4);
  user-select:none;
}

#btn:active{
  transform:scale(.95);
}

/* ANILLO */
.ring{
  position:absolute;
  width:190px;
  height:190px;
  border-radius:50%;
  border:1px dashed rgba(0,212,255,.2);
  animation:spin 10s linear infinite;
}
@keyframes spin{
  to{transform:rotate(360deg);}
}

/* CONSOLA */
#console{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:85%;
  text-align:center;
  font-family:'Share Tech Mono',monospace;
  font-size:14px;
}

/* GLITCH */
.glitch{
  animation:glitch .2s infinite;
}
@keyframes glitch{
  0%{transform:translate(0)}
  50%{transform:translate(-1px,1px)}
  100%{transform:translate(0)}
}

</style>
</head>

<body class="state-idle">

<div class="radar"></div>

<div class="center">
  <div class="ring"></div>

  <div id="btn">ACTIVAR</div>
</div>

<div id="console">Sistema listo...</div>

<script>

let busy = false;

/* ESTADO */
function setState(state){
  document.body.className = "state-" + state;
}

/* VIBRACIÓN */
function vibrate(){
  if(navigator.vibrate){
    navigator.vibrate(50);
  }
}

/* SONIDO (SE CREA SOLO DESPUÉS DEL CLICK) */
let beep;
function initSound(){
  if(!beep){
    beep = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");
  }
}

/* TYPING */
function typeText(text){
  const el = document.getElementById("console");
  el.innerHTML = "";
  let i = 0;

  function write(){
    if(i < text.length){
      el.innerHTML += text.charAt(i);
      i++;
      setTimeout(write, 20);
    }
  }
  write();
}

/* VOZ (CORREGIDA) */
function speak(text){
  if(!('speechSynthesis' in window)) return;

  const msg = new SpeechSynthesisUtterance(text);
  msg.pitch = 0.6;
  msg.rate = 0.9;

  speechSynthesis.cancel(); // evita bugs
  speechSynthesis.speak(msg);
}

/* GLITCH */
function glitch(){
  const el = document.getElementById("console");
  el.classList.add("glitch");
  setTimeout(()=>el.classList.remove("glitch"),300);
}

/* DELAY */
function delay(ms){
  return new Promise(r=>setTimeout(r,ms));
}

/* BOTÓN */
document.getElementById("btn").addEventListener("click", async ()=>{

  if(busy) return;
  busy = true;

  initSound();
  beep.play().catch(()=>{}); // evita error autoplay

  vibrate();

  setState("listening");
  typeText("Escuchando...");
  await delay(1200);

  setState("thinking");
  typeText("Procesando datos...");
  await delay(1500);

  setState("speaking");
  typeText("Sistema activado correctamente.");
  speak("Sistema activado correctamente");

  glitch();

  await delay(2500);

  setState("idle");
  typeText("Sistema listo...");

  busy = false;
});

</script>

</body>
</html>
