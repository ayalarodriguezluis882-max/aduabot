<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AduaBot AI</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
:root{
  --cyan:#00d4ff;
  --bg:#020a14;
}

body{
  margin:0;
  background: radial-gradient(circle,#020a14,#000);
  font-family:'Rajdhani',sans-serif;
  color:#e0f8ff;
  overflow:hidden;
  transition:background .5s;
}

/* ESTADOS */
body.state-idle{background: radial-gradient(circle,#020a14,#000);}
body.state-listening{background: radial-gradient(circle,#140202,#000);}
body.state-thinking{background: radial-gradient(circle,#021014,#000);}
body.state-speaking{background: radial-gradient(circle,#02140a,#000);}

/* RADAR */
.radar{
  position:fixed;
  inset:0;
  background: radial-gradient(circle,rgba(0,212,255,0.08),transparent);
  animation:radar 3s infinite;
}
@keyframes radar{
  0%{transform:scale(.8);opacity:.2}
  50%{transform:scale(1.2);opacity:.5}
  100%{transform:scale(.8);opacity:.2}
}

/* CENTRO */
.center{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

/* BOTÓN */
#btn{
  width:160px;
  height:160px;
  border-radius:50%;
  border:2px solid var(--cyan);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  box-shadow:0 0 30px rgba(0,212,255,.4);
  transition:.2s;
}

#btn:active{
  transform:scale(.95);
}

#btn span{
  font-size:14px;
  letter-spacing:.2em;
}

/* ANILLO */
.ring{
  position:absolute;
  width:200px;
  height:200px;
  border-radius:50%;
  border:1px dashed rgba(0,212,255,.2);
  animation:spin 10s linear infinite;
}
@keyframes spin{
  to{transform:rotate(360deg);}
}

/* CONSOLA */
#console{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:80%;
  text-align:center;
  font-family:'Share Tech Mono',monospace;
  font-size:14px;
}

/* GLITCH */
.glitch{
  animation:glitch .2s infinite;
}
@keyframes glitch{
  0%{transform:translate(0)}
  50%{transform:translate(-1px,1px)}
  100%{transform:translate(0)}
}

</style>
</head>

<body class="state-idle">

<div class="radar"></div>

<div class="center">
  <div class="ring"></div>

  <div id="btn">
    <span>ACTIVAR</span>
  </div>
</div>

<div id="console">Sistema listo...</div>

<script>

/* ESTADO */
function setState(state){
  document.body.className="state-"+state;
}

/* VIBRACIÓN */
function vibrate(){
  if(navigator.vibrate){
    navigator.vibrate([50,30,50]);
  }
}

/* SONIDO */
const beep=new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");

/* TYPING */
function typeText(text){
  let el=document.getElementById("console");
  el.innerHTML="";
  let i=0;

  function write(){
    if(i<text.length){
      el.innerHTML+=text.charAt(i);
      i++;
      setTimeout(write,20);
    }
  }
  write();
}

/* VOZ */
function speak(text){
  let msg=new SpeechSynthesisUtterance(text);
  msg.pitch=0.5;
  msg.rate=0.9;
  speechSynthesis.speak(msg);
}

/* BOTÓN */
document.getElementById("btn").onclick=async()=>{

  vibrate();
  beep.play();

  setState("listening");
  typeText("Escuchando...");

  await delay(1500);

  setState("thinking");
  typeText("Procesando comando...");

  await delay(1500);

  setState("speaking");
  typeText("Respuesta generada.");

  speak("Hola. Sistema activado correctamente.");

  glitch();

  await delay(3000);

  setState("idle");
  typeText("Sistema listo...");
};

/* GLITCH */
function glitch(){
  let el=document.getElementById("console");
  el.classList.add("glitch");

  setTimeout(()=>{
    el.classList.remove("glitch");
  },500);
}

function delay(ms){
  return new Promise(r=>setTimeout(r,ms));
}

</script>

</body>
</html>
