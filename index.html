<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AduaBot">
<meta name="mobile-web-app-capable" content="yes">

<title>AduaBot · AduaMex</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
/* TU DISEÑO ORIGINAL SIN CAMBIOS */
:root{
  --cyan:#00d4ff;--cyan2:#3de8ff;--cyan3:#006699;
  --blue:#0066cc;--deep:#020a14;--mid:#041525;
  --white:#e0f8ff;--red:#ff2244;--green:#00ffaa;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;overscroll-behavior:none;background:#000;position:fixed;}
body{font-family:'Rajdhani',sans-serif;color:var(--cyan);display:flex;justify-content:center;align-items:center;}

#frame{position:fixed;inset:0;border:2px solid var(--cyan);z-index:100;pointer-events:none;animation:breathe 4s infinite;}
@keyframes breathe{0%,100%{opacity:0.3;box-shadow:inset 0 0 15px var(--cyan3);}50%{opacity:1;box-shadow:inset 0 0 40px var(--cyan3),0 0 10px var(--cyan);}}

#app-shell{position:relative;z-index:10;width:100%;height:100%;display:flex;flex-direction:column;padding:20px;background:radial-gradient(circle at center,var(--mid) 0%,var(--deep) 100%);}
.header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid var(--cyan);padding-bottom:10px;margin-bottom:15px;}
.brand h1{font-family:'Bebas Neue';font-size:2.5rem;letter-spacing:4px;color:var(--cyan);line-height:1;}
.brand p{font-family:'Share Tech Mono';font-size:0.6rem;letter-spacing:3px;color:var(--white);opacity:0.6;}

.energy-module{text-align:right;width:120px;}
.energy-label{font-family:'Share Tech Mono';font-size:0.5rem;margin-bottom:4px;display:block;}
.bar-bg{height:6px;background:rgba(255,255,255,0.1);border:1px solid var(--cyan);overflow:hidden;}
#energy-fill{height:100%;width:100%;background:var(--cyan);transition:width 0.5s;box-shadow:0 0 10px var(--cyan);}

#console{flex-grow:0;min-height:100px;background:rgba(0,212,255,0.03);border:1px solid rgba(0,212,255,0.1);padding:15px;color:var(--white);text-align:center;font-size:1rem;margin-bottom:15px;display:flex;align-items:center;justify-content:center;}

.core-wrap{flex-grow:1;display:flex;justify-content:center;align-items:center;position:relative;}
.gears{position:absolute;width:250px;height:250px;background:url('engranes.png') no-repeat center;background-size:contain;opacity:0.3;animation:spin 20s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.main-btn{width:170px;height:170px;border-radius:50%;background:#000;border:4px solid var(--cyan);position:relative;z-index:5;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 0 30px var(--cyan3);outline:none;cursor:pointer;}
.s-listening .main-btn{border-color:var(--red);box-shadow:0 0 50px var(--red);}
.s-thinking .main-btn{border-color:#fff;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
#btn-text{font-family:'Bebas Neue';font-size:1.1rem;margin-top:8px;letter-spacing:2px;color:var(--cyan);}

#keyscreen{position:fixed;inset:0;z-index:500;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;}
.ks-input{background:transparent;border:1px solid var(--cyan);padding:15px;color:#fff;width:260px;text-align:center;font-family:'Share Tech Mono';outline:none;}
.ks-btn{background:var(--cyan);color:#000;padding:12px 30px;border:none;font-family:'Bebas Neue';font-size:1.1rem;cursor:pointer;}
.hidden{display:none !important;}
</style>
</head>
<body>

<div id="frame"></div>

<div id="keyscreen">
    <h1 style="font-family:'Bebas Neue';font-size:2.5rem;letter-spacing:5px;color:var(--cyan);">ADUABOT ACCESO</h1>
    <input type="password" id="ksInput" class="ks-input" placeholder="PEGA TU API KEY">
    <button class="ks-btn" onclick="initOS()">BOOT SYSTEM</button>
</div>

<div id="app-shell" class="hidden">
    <div class="header">
        <div class="brand"><h1>ADUAMEX</h1><p>EXPERTO COMERCIAL // FERIA UNEA</p></div>
        <div class="energy-module">
            <span class="energy-label">ENERGY CORE</span>
            <div class="bar-bg"><div id="energy-fill" style="width:100%;"></div></div>
        </div>
    </div>
    <div id="console">SISTEMA LISTO. MANTÉN EL NÚCLEO PARA HABLAR.</div>
    <div class="core-wrap" id="ptt-trigger">
        <div class="gears"></div>
        <button class="main-btn">
            <svg width="50" height="50" viewBox="0 0 24 24" fill="var(--cyan)">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
            </svg>
            <span id="btn-text">HABLAR</span>
        </button>
    </div>
</div>

<script>
let KEY = ""; let energy = 100; let isHolding = false; let rec = null; let transcript = "";

function initOS() {
    const val = document.getElementById('ksInput').value;
    if(val.length < 10) return alert("ACCESS DENIED");
    KEY = val;
    document.getElementById('keyscreen').classList.add('hidden');
    document.getElementById('app-shell').classList.remove('hidden');
    window.speechSynthesis.getVoices();
}

/* LÓGICA DE MICROFONÍA REPARADA */
function setupMic() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SR) return null;
    const r = new SR(); r.lang = 'es-MX'; r.continuous = true; r.interimResults = true;
    r.onresult = e => {
        let interim = "";
        for(let i=e.resultIndex; i<e.results.length; i++) {
            if(e.results[i].isFinal) transcript += e.results[i][0].transcript;
            else interim += e.results[i][0].transcript;
        }
        document.getElementById('console').textContent = transcript || interim;
    };
    return r;
}

const trigger = document.getElementById('ptt-trigger');
const shell = document.getElementById('app-shell');

function startPTT(e) {
    e.preventDefault(); 
    if(isHolding || energy <= 0) return;
    isHolding = true; 
    transcript = "";
    shell.classList.add('s-listening');
    document.getElementById('btn-text').textContent = "ESCUCHANDO";
    rec = setupMic(); if(rec) rec.start();
}

function stopPTT(e) {
    e.preventDefault(); 
    if(!isHolding) return;
    isHolding = false; 
    shell.classList.remove('s-listening');
    document.getElementById('btn-text').textContent = "HABLAR";
    if(rec) {
        rec.stop();
        setTimeout(() => {
            const q = document.getElementById('console').textContent;
            if(q.length > 2 && !q.includes("SISTEMA")) askIA(q);
        }, 500);
    }
}

trigger.addEventListener('mousedown', startPTT);
trigger.addEventListener('mouseup', stopPTT);
trigger.addEventListener('touchstart', startPTT, {passive: false});
trigger.addEventListener('touchend', stopPTT, {passive: false});

async function askIA(q) {
    shell.classList.add('s-thinking');
    // Usamos el modelo gemini-2.5-flash como tienes en tus registros
    const URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${KEY}`;
    try {
        const res = await fetch(URL, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ contents: [{ parts: [{ text: `Eres AduaBot de AduaMex. Experto comercial en la feria UNEA. Vende servicios. Varón, profesional, muy breve: ${q}` }] }] })
        });
        const data = await res.json();
        shell.classList.remove('s-thinking');
        if(data.candidates) {
            const reply = data.candidates[0].content.parts[0].text;
            document.getElementById('console').textContent = reply;
            speak(reply);
        }
    } catch(err) { shell.classList.remove('s-thinking'); }
}

function speak(t) {
    const synth = window.speechSynthesis;
    if(synth.speaking) synth.cancel();
    const u = new SpeechSynthesisUtterance(t);
    u.lang = 'es-MX'; u.pitch = 0.5; u.rate = 0.95;
    const voices = synth.getVoices();
    const male = voices.find(v => v.name.includes('Jorge') || v.name.toLowerCase().includes('male'));
    if(male) u.voice = male;
    synth.speak(u);
}
</script>
</body>
</html>
