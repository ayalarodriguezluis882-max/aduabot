<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AduaBot Pro — AduaMex</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{ --b:#00cfff; --dark:#03080f; --white:#e0f8ff; --red:#ff2255; }
*{margin:0;padding:0;box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-touch-callout:none; -webkit-user-select:none; user-select:none;}
body{background:var(--dark); min-height:100vh; font-family:'Rajdhani',sans-serif; color:var(--b); overflow:hidden;}
#bgc{position:fixed; inset:0; z-index:0;}

/* KEYSCREEN */
#keyscreen{position:fixed; inset:0; z-index:300; background:#03080f; display:flex; align-items:center; justify-content:center; transition: 0.5s;}
.ks-inner{display:flex; flex-direction:column; align-items:center; gap:15px; width:90%; max-width:400px;}
#ksInput{width:100%; padding:15px; background:rgba(0,207,255,0.1); border:1px solid var(--b); color:white; text-align:center; font-family:monospace;}
.ks-btn{width:100%; padding:15px; background:var(--b); color:#000; border:none; font-family:'Bebas Neue'; font-size:1.2rem; cursor:pointer;}

/* APP */
#app{position:relative; z-index:10; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:space-between; padding:20px; opacity:0; transition:0.8s;}
#app.visible{opacity:1;}

.sp{width:100%; border:1px solid rgba(0,207,255,0.3); background:rgba(0,207,255,0.05); padding:15px; min-height:100px; display:flex; align-items:center; justify-content:center; border-radius:8px; margin:20px 0;}
#sTxt{font-size:1rem; color:var(--white); text-align:center; line-height:1.4; text-shadow: 0 0 5px rgba(0,207,255,0.5);}

.micbtn{width:180px; height:180px; border-radius:50%; border:none; background:none; cursor:pointer; position:relative; display:flex; align-items:center; justify-content:center; outline:none;}
.bbg{position:absolute; inset:0; border-radius:50%; background:radial-gradient(circle, #001828, #03080f); border:2px solid var(--b); transition: 0.2s;}

.s-listening .bbg{border-color:var(--red); box-shadow: 0 0 40px var(--red);}
.s-thinking .bbg{border-color:var(--white); box-shadow: 0 0 40px var(--b); animation: pulse 0.8s infinite;}
@keyframes pulse{ 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }

.blbl{font-family:'Bebas Neue',sans-serif; font-size:0.9rem; letter-spacing:2px; color:var(--b); margin-top:10px; z-index:5;}
</style>
</head>
<body>

<canvas id="bgc"></canvas>

<div id="keyscreen">
  <div class="ks-inner">
    <h1 style="font-family:'Bebas Neue'; letter-spacing:4px;">ADUABOT CLAVE</h1>
    <input id="ksInput" type="password" placeholder="PEGA TU API KEY AQUÍ" />
    <button class="ks-btn" onclick="checkAndLaunch()">CONECTAR SISTEMA</button>
  </div>
</div>

<div id="app">
  <div style="text-align:center;">
    <h2 style="font-family:'Bebas Neue'; font-size:2.5rem;">ADUAMEX</h2>
    <p style="font-size:0.7rem; letter-spacing:5px; color:var(--b);">AGENTE ADUANAL IA</p>
  </div>

  <div class="sp">
    <div id="sTxt">MANTÉN PRESIONADO PARA CONSULTAR</div>
  </div>

  <div class="cblock" id="cb" style="text-align:center;">
    <button class="micbtn" id="pttBtn">
      <div class="bbg"></div>
      <svg width="60" height="60" viewBox="0 0 72 72" style="position:relative;">
          <rect x="14" y="18" width="44" height="30" rx="6" fill="#00cfff" />
          <circle cx="28" cy="30" r="3" fill="#000" />
          <circle cx="44" cy="30" r="3" fill="#000" />
          <path d="M26 40 Q36 45 46 40" stroke="#000" stroke-width="2" fill="none" />
      </svg>
    </button>
    <div class="blbl" id="bLbl">MANTENER</div>
  </div>

  <p style="font-size:0.6rem; opacity:0.5; letter-spacing:2px;">SISTEMA PTT v3.0 · TIJUANA MX</p>
</div>

<input type="hidden" id="apiKey" />

<script>
const btn = document.getElementById('pttBtn');
const sTxt = document.getElementById('sTxt');
const cb = document.getElementById('cb');
const bLbl = document.getElementById('bLbl');

let rec = null;
let isHolding = false;
let speechLog = "";

/* CONFIG MIC */
function initMic() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return null;
    const r = new SR();
    r.lang = 'es-MX';
    r.continuous = true;
    r.interimResults = true;
    r.onresult = (e) => {
        let interim = "";
        for (let i = e.resultIndex; i < e.results.length; ++i) {
            if (e.results[i].isFinal) speechLog += e.results[i][0].transcript;
            else interim += e.results[i][0].transcript;
        }
        sTxt.textContent = speechLog || interim || "...";
    };
    return r;
}

/* EVENTOS MÓVIL */
function start(e) {
    e.preventDefault();
    if(isHolding) return;
    isHolding = true;
    speechLog = "";
    sTxt.textContent = "Te escucho...";
    cb.classList.add('s-listening');
    bLbl.textContent = "SOLTAR";
    rec = initMic();
    if(rec) rec.start();
}

function stop(e) {
    e.preventDefault();
    if(!isHolding) return;
    isHolding = false;
    cb.classList.remove('s-listening');
    bLbl.textContent = "MANTENER";
    if(rec) {
        rec.stop();
        setTimeout(() => {
            const finalQ = sTxt.textContent.trim();
            if(finalQ.length > 3) askGemini(finalQ);
            else sTxt.textContent = "MANTÉN PRESIONADO PARA CONSULTAR";
        }, 500);
    }
}

btn.addEventListener('mousedown', start);
btn.addEventListener('mouseup', stop);
btn.addEventListener('touchstart', start);
btn.addEventListener('touchend', stop);

/* IA LLAMADA CORREGIDA */
async function askGemini(pregunta) {
    const key = document.getElementById('apiKey').value;
    cb.classList.add('s-thinking');
    sTxt.textContent = "Procesando con AduaMex IA...";

    // Usamos la versión v1 que es la de producción más estable
    const URL = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`;

    try {
        const response = await fetch(URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{
                    parts: [{ text: `Eres AduaBot de AduaMex en Tijuana. Responde en menos de 30 palabras a esta duda de aduanas: ${pregunta}. Al final invita a visitarnos.` }]
                }]
            })
        });

        const data = await response.json();
        cb.classList.remove('s-thinking');

        if (data.candidates && data.candidates[0]) {
            const txt = data.candidates[0].content.parts[0].text;
            sTxt.textContent = txt;
            speak(txt);
        } else {
            // Esto nos dirá si la API Key está mal o si hay otro error de Google
            console.error("Detalle del error:", data);
            sTxt.textContent = "Error: " + (data.error?.message || "Revisa tu API Key o conexión.");
        }
    } catch (err) {
        cb.classList.remove('s-thinking');
        sTxt.textContent = "Fallo de conexión. Intenta de nuevo.";
    }
}

function speak(t) {
    const m = new SpeechSynthesisUtterance(t);
    m.lang = 'es-MX';
    window.speechSynthesis.speak(m);
}

function checkAndLaunch() {
    const k = document.getElementById('ksInput').value.trim();
    if(k.length < 10) return alert("Ingresa tu Clave");
    document.getElementById('apiKey').value = k;
    document.getElementById('keyscreen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
}

/* BACKGROUND */
(function(){
  const c=document.getElementById('bgc'),ctx=c.getContext('2d');
  function r(){c.width=window.innerWidth;c.height=window.innerHeight;}
  r(); window.onresize=r;
  let a=0;
  function d(){
    ctx.clearRect(0,0,c.width,c.height);
    ctx.save(); ctx.translate(c.width/2,c.height/2); ctx.rotate(a);
    ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,300,-0.3,0);
    ctx.fillStyle='rgba(0,207,255,0.03)'; ctx.fill(); ctx.restore();
    a+=0.01; requestAnimationFrame(d);
  }
  d();
})();
</script>
</body>
</html>
